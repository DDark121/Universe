services:
  backend-api:
    build: .
    container_name: universe-backend-api
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - attachments_data:/var/lib/universe/attachments
      - faq_index_data:/var/lib/universe/faq-index
      - faq_models_data:/var/lib/universe/faq-models
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/internal/ready"]
      start_period: 90s
      interval: 30s
      timeout: 5s
      retries: 5

  backend-worker:
    build: .
    container_name: universe-backend-worker
    command: celery -A app.tasks.celery_app.celery_app worker -l info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-api:
        condition: service_healthy
    volumes:
      - attachments_data:/var/lib/universe/attachments
      - faq_index_data:/var/lib/universe/faq-index
      - faq_models_data:/var/lib/universe/faq-models
      - ./data:/app/data:ro

  backend-beat:
    build: .
    container_name: universe-backend-beat
    command: celery -A app.tasks.celery_app.celery_app beat -l info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-api:
        condition: service_healthy
    volumes:
      - attachments_data:/var/lib/universe/attachments
      - faq_index_data:/var/lib/universe/faq-index
      - faq_models_data:/var/lib/universe/faq-models

  postgres:
    image: postgres:16-alpine
    container_name: universe-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-universe}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-universe}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: universe-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web-admin:
    build:
      context: ./web-admin
      args:
        VITE_API_BASE_URL: ${WEB_ADMIN_VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: universe-web-admin
    depends_on:
      backend-api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  tg-service:
    build:
      context: .
      dockerfile: tg-service/Dockerfile
    container_name: universe-tg-service
    env_file:
      - .env
    depends_on:
      backend-api:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  student-app:
    build:
      context: ./student-app
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_TG_SERVICE_BASE_URL: ${VITE_TG_SERVICE_BASE_URL:-/tg}
    container_name: universe-student-app
    restart: unless-stopped
    depends_on:
      backend-api:
        condition: service_healthy
      tg-service:
        condition: service_healthy
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  attachments_data:
  faq_index_data:
  faq_models_data:
